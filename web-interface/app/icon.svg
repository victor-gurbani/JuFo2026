<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3" />
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="120" fill="url(#grad)" />
  
  <g filter="url(#shadow)">
    <!-- Data points (scatter plot representation) -->
    <circle cx="160" cy="300" r="16" fill="#fff" opacity="0.9" />
    <circle cx="200" cy="180" r="12" fill="#fff" opacity="0.6" />
    <circle cx="340" cy="220" r="20" fill="#fff" opacity="0.8" />
    <circle cx="280" cy="360" r="14" fill="#fff" opacity="0.7" />
    <circle cx="380" cy="320" r="10" fill="#fff" opacity="0.5" />
    
    <!-- Connection lines (network/PCA axes) -->
    <path d="M 160 300 L 200 180 L 340 220 L 380 320 Z" fill="none" stroke="#fff" stroke-width="4" stroke-dasharray="8 8" opacity="0.4" />
    <path d="M 160 300 L 280 360 L 380 320" fill="none" stroke="#fff" stroke-width="4" stroke-dasharray="8 8" opacity="0.4" />
    
    <!-- Stylized Musical Note merging with 3D axes -->
    <path d="M 230 380 C 200 380 180 360 180 330 C 180 300 200 280 230 280 C 260 280 270 300 270 320 L 270 160 C 270 140 290 130 310 135 L 350 145 C 370 150 380 170 380 190 L 380 300 C 350 300 330 280 330 250 C 330 220 350 200 380 200 M 270 230 L 380 255" fill="none" stroke="#fff" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>